<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desarrollo de Software</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary:   #1e3a5f;
            --accent:    #3a86ff;
            --light:     #e8f0fe;
            --text:      #1a1a2e;
            --muted:     #6b7280;
            --bg-start:  #0f1c2e;
            --bg-end:    #1a3a5c;
            --card:      rgba(255, 255, 255, 0.05);
            --border:    rgba(255, 255, 255, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Fondo con partículas animadas */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 20% 20%, rgba(58, 134, 255, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(58, 134, 255, 0.08) 0%, transparent 50%);
            pointer-events: none;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            animation: float 8s ease-in-out infinite;
            pointer-events: none;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(58, 134, 255, 0.15);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: rgba(30, 58, 95, 0.4);
            bottom: -80px;
            right: -80px;
            animation-delay: -4s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50%       { transform: translate(30px, -30px); }
        }

        /* Tarjeta principal */
        .portada {
            position: relative;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 64px 56px;
            text-align: center;
            max-width: 580px;
            width: 92%;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.06) inset;

            animation: cardEntrance 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes cardEntrance {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Línea decorativa superior */
        .portada::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            border-radius: 2px;
        }

        /* Icono / badge */
        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--accent), #0056cc);
            box-shadow: 0 4px 20px rgba(58, 134, 255, 0.4);
            margin-bottom: 28px;
            animation: badgePop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
        }

        @keyframes badgePop {
            from { opacity: 0; transform: scale(0.5); }
            to   { opacity: 1; transform: scale(1); }
        }

        .badge svg {
            width: 30px;
            height: 30px;
            fill: none;
            stroke: #fff;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Título */
        .portada h1 {
            font-size: 1.55rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.5px;
            line-height: 1.3;
            margin-bottom: 8px;
            animation: fadeUp 0.6s ease 0.45s both;
        }

        .portada h1 span {
            color: var(--accent);
        }

        .subtitulo {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.45);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 40px;
            animation: fadeUp 0.6s ease 0.55s both;
        }

        /* Divider */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
            margin-bottom: 32px;
            animation: fadeUp 0.6s ease 0.6s both;
        }

        /* Info del estudiante */
        .estudiante {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-bottom: 40px;
            animation: fadeUp 0.6s ease 0.65s both;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3a86ff, #0056cc);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
            box-shadow: 0 2px 12px rgba(58, 134, 255, 0.35);
        }

        .estudiante-info {
            text-align: left;
        }

        .nombre {
            font-size: 1.05rem;
            font-weight: 600;
            color: #ffffff;
        }

        .etiqueta {
            font-size: 0.78rem;
            color: rgba(255, 255, 255, 0.45);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* Navegación */
        nav {
            animation: fadeUp 0.6s ease 0.75s both;
        }

        nav p {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.35);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 14px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            background: linear-gradient(135deg, var(--accent), #0056cc);
            color: #ffffff;
            text-decoration: none;
            border-radius: 10px;
            font-size: 0.92rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 18px rgba(58, 134, 255, 0.35);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(58, 134, 255, 0.5);
        }

        .btn:hover::after {
            opacity: 1;
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn svg {
            width: 16px;
            height: 16px;
            stroke: #fff;
            fill: none;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: transform 0.2s;
        }

        .btn:hover svg {
            transform: translateX(3px);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="portada">

        <div class="badge">
            <svg viewBox="0 0 24 24">
                <polyline points="16 18 22 12 16 6"></polyline>
                <polyline points="8 6 2 12 8 18"></polyline>
            </svg>
        </div>

        <h1>Desarrollo de Software<br><span>y Programación</span></h1>
        <p class="subtitulo">Portafolio de curso</p>

        <div class="divider"></div>

        <div class="estudiante">
            <div class="avatar">MC</div>
            <div class="estudiante-info">
                <p class="nombre">Manuel Chicaiza</p>
                <p class="etiqueta">Estudiante</p>
            </div>
        </div>

        <nav>
            <p>Contenido del curso</p>
            <a class="btn" href="deber1.html">
                Ir a deberes
                <svg viewBox="0 0 24 24">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </a>
        </nav>

    </div>
</body>
</html>
