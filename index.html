<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desarrollo de Software</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent:   #3a86ff;
            --bg-start: #0f1c2e;
            --bg-end:   #1a3a5c;
            --card:     rgba(255, 255, 255, 0.05);
            --border:   rgba(255, 255, 255, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 20% 20%, rgba(58,134,255,0.12) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(58,134,255,0.08) 0%, transparent 50%);
            pointer-events: none;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            animation: float 8s ease-in-out infinite;
            pointer-events: none;
        }
        .orb-1 { width:400px; height:400px; background:rgba(58,134,255,0.15); top:-100px; left:-100px; }
        .orb-2 { width:300px; height:300px; background:rgba(30,58,95,0.4); bottom:-80px; right:-80px; animation-delay:-4s; }

        @keyframes float {
            0%,100% { transform: translate(0,0); }
            50%      { transform: translate(30px,-30px); }
        }

        .portada {
            position: relative;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 56px 52px;
            text-align: center;
            max-width: 600px;
            width: 92%;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.06) inset;
            animation: cardEntrance 0.8s cubic-bezier(0.22,1,0.36,1) both;
        }

        .portada::before {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 60%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        @keyframes cardEntrance {
            from { opacity:0; transform:translateY(40px) scale(0.96); }
            to   { opacity:1; transform:translateY(0) scale(1); }
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px; height: 64px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--accent), #0056cc);
            box-shadow: 0 4px 20px rgba(58,134,255,0.4);
            margin-bottom: 24px;
            animation: badgePop 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
        }

        @keyframes badgePop {
            from { opacity:0; transform:scale(0.5); }
            to   { opacity:1; transform:scale(1); }
        }

        .badge svg { width:30px; height:30px; fill:none; stroke:#fff; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

        h1 {
            font-size: 1.55rem;
            font-weight: 700;
            color: #fff;
            line-height: 1.3;
            margin-bottom: 6px;
            animation: fadeUp 0.6s ease 0.45s both;
        }
        h1 span { color: var(--accent); }

        .subtitulo {
            font-size: 0.78rem;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 32px;
            animation: fadeUp 0.6s ease 0.5s both;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
            margin-bottom: 28px;
            animation: fadeUp 0.6s ease 0.55s both;
        }

        .estudiante {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-bottom: 32px;
            animation: fadeUp 0.6s ease 0.6s both;
        }

        .avatar {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3a86ff, #0056cc);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; font-weight: 700; color: #fff;
            flex-shrink: 0;
            box-shadow: 0 2px 12px rgba(58,134,255,0.35);
        }

        .estudiante-info { text-align: left; }
        .nombre  { font-size: 1.05rem; font-weight: 600; color: #fff; }
        .etiqueta { font-size: 0.78rem; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1.5px; }

        /* Sección navegación */
        .nav-label {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.35);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 16px;
            animation: fadeUp 0.6s ease 0.65s both;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            animation: fadeUp 0.6s ease 0.7s both;
        }

        .nav-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 20px 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 14px;
            text-decoration: none;
            color: #fff;
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s, border-color 0.2s;
            position: relative;
            overflow: hidden;
        }

        .nav-card::before {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 50%; height: 2px;
            border-radius: 2px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .nav-card:hover {
            transform: translateY(-3px);
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.22);
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
        }

        .nav-card:hover::before { opacity: 1; }

        /* Colores por sección */
        .nav-card.deberes  .icon-wrap { background: linear-gradient(135deg, #3a86ff, #0056cc); box-shadow: 0 4px 14px rgba(58,134,255,0.4); }
        .nav-card.deberes::before     { background: linear-gradient(90deg, transparent, #3a86ff, transparent); }

        .nav-card.lecciones .icon-wrap { background: linear-gradient(135deg, #8b5cf6, #6d28d9); box-shadow: 0 4px 14px rgba(139,92,246,0.4); }
        .nav-card.lecciones::before    { background: linear-gradient(90deg, transparent, #8b5cf6, transparent); }

        .nav-card.examenes .icon-wrap  { background: linear-gradient(135deg, #f59e0b, #d97706); box-shadow: 0 4px 14px rgba(245,158,11,0.4); }
        .nav-card.examenes::before     { background: linear-gradient(90deg, transparent, #f59e0b, transparent); }

        .icon-wrap {
            width: 44px; height: 44px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        .icon-wrap svg { width:22px; height:22px; fill:none; stroke:#fff; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

        .nav-card-label {
            font-size: 0.88rem;
            font-weight: 600;
            color: #fff;
        }

        .nav-card-count {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.4);
        }

        .link-plataforma {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 16px;
            padding: 14px 20px;
            background: rgba(34,197,94,0.08);
            border: 1px solid rgba(34,197,94,0.25);
            border-radius: 14px;
            text-decoration: none;
            color: #4ade80;
            font-size: 0.88rem;
            font-weight: 600;
            transition: background 0.2s, border-color 0.2s, transform 0.2s;
            animation: fadeUp 0.6s ease 0.75s both;
        }
        .link-plataforma:hover {
            background: rgba(34,197,94,0.15);
            border-color: rgba(34,197,94,0.45);
            transform: translateY(-2px);
        }
        .link-plataforma svg { width:16px; height:16px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }

        .plataforma-label {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: var(--accent);
            background: rgba(58,134,255,0.1);
            border: 1px solid rgba(58,134,255,0.25);
            border-radius: 20px;
            padding: 4px 14px;
            margin-bottom: 14px;
            animation: fadeUp 0.6s ease 0.38s both;
        }

        @keyframes fadeUp {
            from { opacity:0; transform:translateY(16px); }
            to   { opacity:1; transform:translateY(0); }
        }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="portada">

        <div class="badge">
            <svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
        </div>

        <p class="plataforma-label">Plataforma de Aprendizaje Cybersecurity</p>
        <h1>Desarrollo de Software<br><span>y Programación</span></h1>
        <p class="subtitulo">Portafolio de curso</p>

        <div class="divider"></div>

        <div class="estudiante">
            <div class="avatar">MC</div>
            <div class="estudiante-info">
                <p class="nombre">Manuel Chicaiza</p>
                <p class="etiqueta">Estudiante</p>
            </div>
        </div>

        <p class="nav-label">Contenido del curso</p>

        <div class="nav-grid">

            <a class="nav-card deberes" href="deberes.html">
                <div class="icon-wrap">
                    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                </div>
                <span class="nav-card-label">Deberes</span>
                <span class="nav-card-count">3 tareas</span>
            </a>

            <a class="nav-card lecciones" href="lecciones.html">
                <div class="icon-wrap">
                    <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
                </div>
                <span class="nav-card-label">Lecciones</span>
                <span class="nav-card-count">1 lección</span>
            </a>

            <a class="nav-card examenes" href="examenes.html">
                <div class="icon-wrap">
                    <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"></path><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
                </div>
                <span class="nav-card-label">Exámenes</span>
                <span class="nav-card-count">1 examen</span>
            </a>

        </div>

        <a class="link-plataforma" href="https://web-production-bcb0c.up.railway.app/#/auth" target="_blank">
            <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
            Link Plataforma de Aprendizaje
        </a>

    </div>
</body>
</html>
